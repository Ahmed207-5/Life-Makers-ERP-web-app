
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Makers ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ==============================
// SUPABASE CONFIG
// ==============================

const SUPABASE_URL = "https://bgowbzfqeniywumgjdku.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OlsyEX-VMjAoZjHmnBUayg_bcdtIOpA";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

// ==============================
// LOGIN FUNCTION
// ==============================

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Enter email and password");
    return;
  }

  const { data, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("email", email)
    .eq("password", password)
    .single();

  if(error || !data){
    alert("Invalid email or password");
    return;
  }

  localStorage.setItem("lm_user", JSON.stringify(data));

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("welcome").innerText =
    "Welcome " + data.name;
}
</script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  margin:0;
}

.login-box{
  width:350px;
  background:white;
  margin:100px auto;
  padding:30px;
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
  cursor:pointer;
}

.dashboard{
  display:none;
  color:white;
  padding:40px;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
<h2>Life Makers ERP</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">
<h1 id="welcome"></h1>
<p>ERP System Connected Successfully To Supabase</p>
</div>

</body>
</html>
