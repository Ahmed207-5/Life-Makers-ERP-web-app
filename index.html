<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Life Makers ERP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Cairo',sans-serif;

}



body{

background:#081225;

color:white;

}



.login-page{

display:flex;

align-items:center;

justify-content:center;

height:100vh;

}



.login-box{

width:360px;

background:white;

color:#111;

padding:30px;

border-radius:24px;

}



.login-box h1{

margin-bottom:10px;

font-size:32px;

}



.login-box p{

color:#777;

margin-bottom:20px;

}



input,select,textarea{

width:100%;

padding:12px;

margin-top:10px;

border-radius:12px;

border:1px solid #ccc;

}



button{

background:#0f172a;

color:white;

border:none;

padding:12px;

border-radius:12px;

margin-top:15px;

width:100%;

cursor:pointer;

font-weight:bold;

}



.dashboard{

display:none;

}



.sidebar{

position:fixed;

left:0;

top:0;

width:260px;

height:100vh;

background:#0f172a;

padding:20px;

overflow:auto;

}



.logo{

font-size:28px;

font-weight:bold;

margin-bottom:30px;

color:#f59e0b;

}



.menu button{

margin-top:10px;

text-align:left;

background:#111c35;

}



.main{

margin-left:260px;

padding:30px;

}



.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}



.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}



.card{

background:#111c35;

padding:20px;

border-radius:18px;

}



.card h2{

font-size:35px;

margin-top:10px;

}



.section{

background:#111c35;

padding:20px;

border-radius:18px;

margin-top:20px;

}



.table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



.table th,.table td{

padding:12px;

border-bottom:1px solid rgba(255,255,255,.1);

text-align:left;

}



.hidden{

display:none;

}



.badge{

padding:6px 12px;

border-radius:999px;

font-size:12px;

background:#1e293b;

}



@media(max-width:900px){

.sidebar{

width:100%;

height:auto;

position:relative;

}



.main{

margin-left:0;

}

}

</style>

</head>

<body>



<div class="login-page" id="loginPage">

<div class="login-box">

<h1>Life Makers ERP</h1>

<p>Sharqia Management System</p>



<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>



<div class="dashboard" id="dashboard">

<div class="sidebar">

<div class="logo">LM ERP</div>



<div class="menu">

<button onclick="showSection('overview')">Dashboard</button>

<button onclick="showSection('employees')">Employees</button>

<button onclick="showSection('attendance')">Attendance</button>

<button onclick="showSection('inventory')">Inventory</button>

<button onclick="showSection('purchases')">Purchases</button>

<button onclick="showSection('finance')">Finance</button>

<button onclick="showSection('tasks')">Tasks</button>

<button onclick="showSection('volunteers')">Volunteers</button>

<button onclick="logout()">Logout</button>

</div>

</div>



<div class="main">

<div class="topbar">

<h1 id="welcomeText">Dashboard</h1>

<div id="userRole"></div>

</div>



<div id="overview" class="page-section">

<div class="cards">

<div class="card">

<p>Employees</p>

<h2 id="employeesCount">0</h2>

</div>



<div class="card">

<p>Inventory Items</p>

<h2 id="inventoryCount">0</h2>

</div>



<div class="card">

<p>Purchases</p>

<h2 id="purchaseCount">0</h2>

</div>



<div class="card">

<p>Finance Records</p>

<h2 id="financeCount">0</h2>

</div>

</div>

</div>



<div id="employees" class="page-section hidden">

<div class="section">

<h2>Employees</h2>



<input id="empName" placeholder="Employee Name">

<input id="empDepartment" placeholder="Department">

<input id="empSalary" placeholder="Salary">

<button onclick="addEmployee()">Add Employee</button>



<table class="table" id="employeesTable"></table>

</div>

</div>



<div id="attendance" class="page-section hidden">

<div class="section">

<h2>Attendance</h2>



<input id="attName" placeholder="Employee Name">

<select id="attType">

<option value="Check In">Check In</option>

<option value="Check Out">Check Out</option>

</select>

<button onclick="addAttendance()">Save Attendance</button>



<table class="table" id="attendanceTable"></table>

</div>

</div>



<div id="inventory" class="page-section hidden">

<div class="section">

<h2>Inventory</h2>



<input id="itemName" placeholder="Item Name">

<input id="itemQty" placeholder="Quantity">

<button onclick="addInventory()">Add Item</button>



<table class="table" id="inventoryTable"></table>

</div>

</div>



<div id="purchases" class="page-section hidden">

<div class="section">

<h2>Purchases</h2>



<input id="purchaseItem" placeholder="Purchase Item">

<input id="purchaseCost" placeholder="Estimated Cost">

<button onclick="addPurchase()">Create Purchase</button>



<table class="table" id="purchasesTable"></table>

</div>

</div>



<div id="finance" class="page-section hidden">

<div class="section">

<h2>Finance</h2>



<input id="financeDesc" placeholder="Description">

<input id="financeAmount" placeholder="Amount">

<select id="financeType">

<option value="income">Income</option>

<option value="expense">Expense</option>

</select>

<button onclick="addFinance()">Save Record</button>



<table class="table" id="financeTable"></table>

</div>

</div>



<div id="tasks" class="page-section hidden">

<div class="section">

<h2>Tasks</h2>



<input id="taskTitle" placeholder="Task Title">

<input id="taskAssigned" placeholder="Assigned To">

<button onclick="addTask()">Add Task</button>



<table class="table" id="tasksTable"></table>

</div>

</div>



<div id="volunteers" class="page-section hidden">

<div class="section">

<h2>Volunteers</h2>



<input id="volName" placeholder="Volunteer Name">

<input id="volPhone" placeholder="Phone">

<button onclick="addVolunteer()">Add Volunteer</button>



<table class="table" id="volunteersTable"></table>

</div>

</div>

</div>

</div>



<script>

const SUPABASE_URL = "YOUR_SUPABASE_URL";

const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";



const supabaseClient = supabase.createClient(

SUPABASE_URL,

SUPABASE_ANON_KEY

);



async function login(){

const email = document.getElementById('email').value;

const password = document.getElementById('password').value;



const { data, error } = await supabaseClient

.from('users')

.select('*')

.eq('email', email)

.eq('password', password)

.single();



console.log(data);

console.log(error);



if(error || !data){

alert('Invalid email or password');

return;

}



localStorage.setItem('lm_user', JSON.stringify(data));



document.getElementById('loginPage').style.display='none';

document.getElementById('dashboard').style.display='block';



document.getElementById('welcomeText').innerText = 'Welcome ' + data.name;

document.getElementById('userRole').innerHTML = `<span class='badge'>${data.role}</span>`;



loadAllData();

}



function logout(){

localStorage.removeItem('lm_user');

location.reload();

}



function showSection(id){

document.querySelectorAll('.page-section').forEach(sec=>{

sec.classList.add('hidden');

});



document.getElementById(id).classList.remove('hidden');

}



async function loadAllData(){

loadEmployees();

loadAttendance();

loadInventory();

loadPurchases();

loadFinance();

loadTasks();

loadVolunteers();

}



async function addEmployee(){

await supabaseClient.from('employees').insert({

name:document.getElementById('empName').value,

department:document.getElementById('empDepartment').value,

salary:document.getElementById('empSalary').value

});



loadEmployees();

}



async function loadEmployees(){

const { data } = await supabaseClient.from('employees').select('*');



let html=`<tr><th>Name</th><th>Department</th><th>Salary</th></tr>`;



data?.forEach(item=>{

html += `

<tr>

<td>${item.name||''}</td>

<td>${item.department||''}</td>

<td>${item.salary||0}</td>

</tr>`;

});



employeesTable.innerHTML = html;

document.getElementById('employeesCount').innerText = data?.length || 0;

}



async function addAttendance(){

await supabaseClient.from('attendance').insert({

employee_name:attName.value,

type:attType.value

});



loadAttendance();

}



async function loadAttendance(){

const { data } = await supabaseClient.from('attendance').select('*');



let html=`<tr><th>Name</th><th>Type</th></tr>`;



data?.forEach(item=>{

html += `<tr><td>${item.employee_name}</td><td>${item.type}</td></tr>`;

});



attendanceTable.innerHTML = html;

}



async function addInventory(){

await supabaseClient.from('inventory').insert({

name:itemName.value,

quantity:itemQty.value

});



loadInventory();

}



async function loadInventory(){

const { data } = await supabaseClient.from('inventory').select('*');



let html=`<tr><th>Item</th><th>Quantity</th></tr>`;



data?.forEach(item=>{

html += `<tr><td>${item.name}</td><td>${item.quantity}</td></tr>`;

});



inventoryTable.innerHTML = html;

document.getElementById('inventoryCount').innerText = data?.length || 0;

}



async function addPurchase(){

await supabaseClient.from('purchases').insert({

item:purchaseItem.value,

estimated_cost:purchaseCost.value

});



loadPurchases();

}



async function loadPurchases(){

const { data } = await supabaseClient.from('purchases').select('*');



let html=`<tr><th>Item</th><th>Cost</th></tr>`;



data?.forEach(item=>{

html += `<tr><td>${item.item}</td><td>${item.estimated_cost}</td></tr>`;

});



purchasesTable.innerHTML = html;

document.getElementById('purchaseCount').innerText = data?.length || 0;

}



async function addFinance(){

await supabaseClient.from('finance').insert({

description:financeDesc.value,

amount:financeAmount.value,

type:financeType.value

});



loadFinance();

}



async function loadFinance(){

const { data } = await supabaseClient.from('finance').select('*');



let html=`<tr><th>Description</th><th>Amount</th><th>Type</th></tr>`;



data?.forEach(item=>{

html += `<tr><td>${item.description}</td><td>${item.amount}</td><td>${item.type}</td></tr>`;

});



financeTable.innerHTML = html;

document.getElementById('financeCount').innerText = data?.length || 0;

}



async function addTask(){

await supabaseClient.from('tasks').insert({

title:taskTitle.value,

assigned_name:taskAssigned.value

});



loadTasks();

}



async function loadTasks(){

const { data } = await supabaseClient.from('tasks').select('*');



let html=`<tr><th>Task</th><th>Assigned</th></tr>`;



data?.forEach(item=>{

html += `<tr><td>${item.title}</td><td>${item.assigned_name}</td></tr>`;

});



tasksTable.innerHTML = html;

}



async function addVolunteer(){

await supabaseClient.from('volunteers').insert({

name:volName.value,

phone:volPhone.value

});



loadVolunteers();

}



async function loadVolunteers(){

const { data } = await supabaseClient.from('volunteers').select('*');



let html=`<tr><th>Name</th><th>Phone</th></tr>`;



data?.forEach(item=>{

html += `<tr><td>${item.name}</td><td>${item.phone}</td></tr>`;

});



volunteersTable.innerHTML = html;

}



window.onload = ()=>{

const user = localStorage.getItem('lm_user');



if(user){

document.getElementById('loginPage').style.display='none';

document.getElementById('dashboard').style.display='block';

loadAllData();

}

}

</script>

</body>

</html>
